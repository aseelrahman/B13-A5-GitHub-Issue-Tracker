<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Home</title>
  </head>
  <body>
    <!-- navbar -->
    <header>
      <div class="navbar bg-base-100 shadow-sm flex justify-between px-[80px]">
        <div class="flex gap-1 items-center">
          <span class="h-9 w-9"
            ><img src="assets/github-logo.png" alt=""
          /></span>
          <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
          <input
            id="search-input"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-24 md:w-auto"
          />
          <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
      </div>
    </header>
    <main class="bg-[#F8FAFC] min-h-screen py-[60px]">
      <!-- Tab Section -->
      <section
        class="flex mx-auto rounded-lg gap-2 w-[1110px] p-6 bg-[#FFFFFF] mb-4"
      >
        <button
          data-status="all"
          class="btn btn-soft btn-primary active w-[120px]"
        >
          All
        </button>
        <button data-status="open" class="btn btn-soft btn-primary w-[120px]">
          Open
        </button>
        <button data-status="closed" class="btn btn-soft btn-primary w-[120px]">
          Closed
        </button>
      </section>
      <!-- Issues Section -->
      <section
        class="flex flex-col mx-auto rounded-lg w-[1110px] p-6 bg-[#FFFFFF]"
      >
        <div class="flex w-full items-center justify-between">
          <div class="flex gap-2">
            <span
              ><img
                class="h-[50px] w-[50px]"
                src="assets/Aperture.png"
                alt="aperture icon"
            /></span>
            <div>
              <h2 class="text-[20px] font-semibold">
                <span id="count">0</span> Issues
              </h2>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-4">
            <p class="flex gap-2">
              <span
                ><img src="assets/Open-Status.png" alt="open status icon"
              /></span>
              Open
            </p>
            <p class="flex gap-2">
              <span
                ><img src="assets/Closed- Status .png" alt="closed status icon"
              /></span>
              Closed
            </p>
          </div>
        </div>
      </section>

      <!-- spinner -->
      <section id="spinner" class="flex justify-center p-50 hidden">
        <span class="loading loading-bars loading-xl"></span>
      </section>
      <!-- Cards Container-->
      <section
        id="card-container"
        class="bg-[#FBFBFB] grid grid-cols-4 items-stretch gap-3 mx-auto rounded-lg w-[1110px] p-6"
      >
        <!-- Card -->
        <div
          class="h-[256px] w-[256px] bg-[#FFFFFF] rounded p-4 border-t-3 border-[#00A96E]"
        >
          <div class="flex justify-between mb-3">
            <span><img src="assets/Open-Status.png" alt="" /></span>
            <span
              class="text-[14px] w-[80px] bg-[#FEECEC] text-[#EF4444] flex justify-center items-center rounded-full"
              >High</span
            >
          </div>
          <div class="mb-4">
            <div>
              <h3 class="font-semibold text-[14px]">
                Fix navigation menu on mobile devices
              </h3>
              <p class="text-[12px] text-[#64748B]">
                The navigation menu doesn't collapse properly on mobile
                devices...
              </p>
            </div>
            <div class="flex gap-1 justify-start items-center mt-3">
              <span
                class="text-[12px] p-[6px] font-medium border border-[#FECACA] bg-[#FEECEC] text-[#EF4444] rounded-full"
                ><i class="fa-solid fa-bug"></i> BUG</span
              >
              <span
                class="text-[12px] p-[6px] font-medium border border-[#FDE68A] bg-[#FFF8DB] text-[#D97706] rounded-full"
                ><i class="fa-solid fa-bug"></i> HELP WANTED</span
              >
              <span
                class="text-[12px] p-[6px] font-medium border border-[#BBF7D0] bg-[#DEFCE8] text-[#00A96E] rounded-full"
                ><i class="fa-solid fa-bahai"></i> ENHANCEMENT</span
              >
            </div>
          </div>
          <hr class="border-[#E4E4E7] border-1" />
          <div class="mt-4">
            <p class="text-[12px] text-[#64748B]">#1 by john_doe</p>
            <p class="text-[12px] text-[#64748B]">1/15/2024</p>
          </div>
        </div>
      </section>

      <!-- Modal -->
      <!-- Open the modal using ID.showModal() method -->

      <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
        <div id="modal-detail-container" class="modal-box p-8 space-y-6"></div>
      </dialog>
    </main>
    <script src="js/card-details.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
