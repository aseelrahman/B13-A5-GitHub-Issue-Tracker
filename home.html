<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Home</title>
  </head>
  <body>
    <!-- navbar -->
    <header>
      <div class="navbar bg-base-100 shadow-sm flex justify-between">
        <div class="flex gap-1 items-center">
          <span class="h-9 w-9"><img src="assets/github-logo.png" alt=""></span>
          <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-24 md:w-auto"
          />
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>
    <main class="bg-[#F8FAFC] min-h-screen py-[60px]">
      <!-- Tab Section -->
      <section class="flex mx-auto rounded-lg gap-2 w-[1110px] p-6 bg-[#FFFFFF]">
        <button class="btn btn-soft btn-primary w-[120px]">All</button>
        <button class="btn btn-soft btn-primary w-[120px]">Open</button>
        <button class="btn btn-soft btn-primary w-[120px]">Closed</button>
      </section>
    </main>
  </body>
</html>
