<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <title>GitHub Issues Tracer</title>
  </head>
  <body class="flex justify-center items-center bg-[#F8FAFC] min-h-screen">
    <section
      id="login-page"
      class="w-[520px] p-8 space-y-6 shadow-lg bg-[#FFFFFF] rounded-lg"
    >
      <div class="flex flex-col justify-center items-center">
        <img
          class="h-[100px] w-[100px] mb-6"
          src="assets/github-logo.png"
          alt="GitHub Logo"
        />
        <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <div class="space-y-4">
        <div>
          <label for="username" class="block mb-2 font-medium">Username</label>
          <label class="input w-full rounded-lg">
            <input
              id="username"
              type="text"
              placeholder="Enter Username"
              required
            />
          </label>
          <p class="text-primary text-sm mt-1">Default: admin</p>
        </div>

        <div>
          <label for="password" class="block mb-2 font-medium">Password</label>
          <label class="input w-full rounded-lg">
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              required
            />
          </label>
          <p class="text-primary text-sm mt-1">Default: admin123</p>
        </div>
      </div>
      <!-- Submit Button -->
      <button class="btn btn-primary w-full rounded-lg">Sign In</button>

      <div class="flex items-center gap-4">
        <hr class="flex-1 border-t border-[#E4E4E7]" />
        <span>OR</span>
        <hr class="flex-1 border-t border-[#E4E4E7]" />
      </div>

      <div>
        <p class="text-[#64748B] text-[14px] text-center mb-2">
          Demo Credentials:
        </p>
        <div class="bg-[#F8FAFC] text-center py-6 rounded-lg">
          <p><span>Username:</span> admin</p>
          <p><span>Password:</span> admin123</p>
        </div>
      </div>
    </section>
  </body>
</html>
